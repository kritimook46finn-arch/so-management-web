<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INS Sale Order</title>
<style>
:root{
  --bg:#F7F8FA;
  --surface:#FFFFFF;
  --surface2:#F3F4F6;
  --surface3:#E9EAEC;
  --border:#E5E7EB;
  --border2:#D1D5DB;
  --text:#111827;
  --text2:#4B5563;
  --text3:#9CA3AF;
  --green:#059669;
  --green-soft:#ECFDF5;
  --green-mid:#D1FAE5;
  --green-dark:#065F46;
  --amber:#D97706;
  --amber-soft:#FFFBEB;
  --red:#DC2626;
  --red-soft:#FEF2F2;
  --blue:#2563EB;
  --blue-soft:#EFF6FF;
  --purple:#7C3AED;
  --purple-soft:#F5F3FF;
  --r:10px;--r-sm:7px;
  --font:'Inter','Noto Sans Thai','Leelawadee UI','Segoe UI',system-ui,sans-serif;
  --mono:'JetBrains Mono','Fira Code','Consolas',monospace;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 12px rgba(0,0,0,.1),0 2px 4px rgba(0,0,0,.06);
  --shadow-lg:0 20px 40px rgba(0,0,0,.12),0 8px 16px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;color:var(--text);background:#fff;border:1.5px solid var(--border2);border-radius:var(--r-sm);padding:9px 12px;font-size:14px;width:100%;outline:none;transition:border-color .15s,box-shadow .15s}
input:focus,select:focus,textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(5,150,105,.12)}
select option{background:#fff}
textarea{resize:vertical;min-height:72px}
a{color:var(--green);text-decoration:none}
a:hover{text-decoration:underline}

/* LAYOUT */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:224px;background:#111827;display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sidebar-brand{padding:20px 18px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.08)}
.brand-icon{width:34px;height:34px;border-radius:9px;background:var(--green);display:grid;place-items:center;flex-shrink:0}
.brand-icon svg{width:17px;height:17px;fill:none;stroke:#fff;stroke-width:2}
.brand-name{font-size:13px;font-weight:700;color:#fff;letter-spacing:.3px}
.brand-sub{font-size:10px;color:rgba(255,255,255,.35);margin-top:1px}
.sidebar-role{margin:12px 12px 4px;padding:10px 12px;border-radius:var(--r-sm);background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08)}
.sidebar-role strong{display:block;font-size:12px;font-weight:700;color:#fff;margin-bottom:2px}
.sidebar-role span{font-size:11px;color:rgba(255,255,255,.4)}
.sidebar-nav{padding:8px;flex:1;overflow-y:auto}
.nav-section{font-size:10px;font-weight:700;color:rgba(255,255,255,.25);letter-spacing:.8px;padding:10px 8px 4px;text-transform:uppercase}
.nav-btn{display:flex;align-items:center;gap:9px;width:100%;padding:9px 10px;border-radius:var(--r-sm);font-size:13px;color:rgba(255,255,255,.55);text-align:left;transition:all .12s;position:relative}
.nav-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.75;flex-shrink:0}
.nav-btn:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85)}
.nav-btn.active{background:var(--green);color:#fff;font-weight:600}
.nav-btn.active svg{stroke:#fff}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;border-radius:99px;padding:1px 6px;min-width:18px;text-align:center}
.sidebar-footer{padding:12px;border-top:1px solid rgba(255,255,255,.07)}
.logout-btn{display:flex;align-items:center;gap:8px;width:100%;padding:8px 10px;border-radius:var(--r-sm);font-size:12px;color:rgba(255,255,255,.35);transition:all .12s}
.logout-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.75}
.logout-btn:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.7)}

/* MAIN */
.main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;height:54px;display:flex;align-items:center;gap:12px;flex-shrink:0;box-shadow:var(--shadow)}
.topbar-title{font-size:15px;font-weight:700;color:var(--text);flex-shrink:0}
.topbar-search{display:flex;align-items:center;gap:8px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:7px 12px;flex:1;max-width:300px;transition:border-color .15s}
.topbar-search:focus-within{border-color:var(--green);background:#fff}
.topbar-search input{background:none;border:none;padding:0;font-size:13px;color:var(--text);width:100%;box-shadow:none}
.topbar-search input:focus{box-shadow:none;border:none}
.topbar-search svg{width:14px;height:14px;stroke:var(--text3);fill:none;flex-shrink:0}
.topbar-actions{display:flex;align-items:center;gap:8px;margin-left:auto}
.content-scroll{flex:1;overflow-y:auto;padding:24px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:7px;border-radius:var(--r-sm);font-size:13px;font-weight:600;padding:8px 14px;transition:all .12s;cursor:pointer;white-space:nowrap}
.btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0}
.btn-primary{background:var(--green);color:#fff;box-shadow:0 1px 2px rgba(5,150,105,.25)}
.btn-primary:hover{background:#047857}
.btn-success{background:var(--green);color:#fff}
.btn-success:hover{background:#047857}
.btn-ghost{background:#fff;color:var(--text2);border:1.5px solid var(--border2)}
.btn-ghost:hover{background:var(--surface2);border-color:var(--border2);color:var(--text)}
.btn-danger{background:var(--red-soft);color:var(--red);border:1.5px solid rgba(220,38,38,.2)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}

/* CARDS */
.card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:18px;box-shadow:var(--shadow)}
.card-title{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:12px;text-transform:uppercase;letter-spacing:.6px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.stat-green::after{background:var(--green)}
.stat-amber::after{background:var(--amber)}
.stat-red::after{background:var(--red)}
.stat-blue::after{background:var(--blue)}
.stat-purple::after{background:var(--purple)}
.stat-label{font-size:11px;color:var(--text3);font-weight:600;letter-spacing:.4px;text-transform:uppercase;margin-bottom:6px}
.stat-value{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.5px;color:var(--text)}
.stat-value small{font-size:12px;font-weight:500;color:var(--text3)}

/* FILTERS */
.filter-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.filter-chip{padding:5px 12px;border-radius:99px;font-size:12px;font-weight:600;background:#fff;color:var(--text2);border:1.5px solid var(--border2);cursor:pointer;transition:all .12s;white-space:nowrap}
.filter-chip:hover{border-color:var(--green);color:var(--green)}
.filter-chip.active{background:var(--green);color:#fff;border-color:var(--green)}

/* TABLE */
.table-wrap{background:#fff;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.order-table{width:100%;border-collapse:collapse}
.order-table th{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:11px 14px;text-align:left;border-bottom:1px solid var(--border);background:var(--bg)}
.order-table td{padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
.order-table tbody tr:last-child td{border-bottom:none}
.order-table tbody tr{cursor:pointer;transition:background .1s}
.order-table tbody tr:hover{background:#F0FDF9}
.order-no{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--green)}
.order-cust{font-weight:600;font-size:13px;color:var(--text)}
.order-cust-sub{font-size:11px;color:var(--text3);margin-top:1px}
.order-amount{font-weight:700;font-variant-numeric:tabular-nums;text-align:right}
.order-date{font-size:12px;color:var(--text2)}

/* PIPELINE */
.pipeline{display:flex;align-items:center;gap:0;flex-wrap:nowrap}
.pipe-step{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 8px;white-space:nowrap;letter-spacing:.3px}
.pipe-step:first-child{border-radius:5px 0 0 5px}
.pipe-step:last-child{border-radius:0 5px 5px 0}
.pipe-step svg{width:11px;height:11px;fill:none;stroke:currentColor;stroke-width:2;flex-shrink:0}
.pipe-done{background:var(--green);color:#fff}
.pipe-active{background:var(--green);color:#fff}
.pipe-wait{background:var(--surface3);color:var(--text3)}
.pipe-sep{color:var(--border2);font-size:10px;line-height:1}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;white-space:nowrap}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}
.badge-paid{background:var(--green-soft);color:var(--green)}
.badge-unpaid{background:var(--amber-soft);color:var(--amber)}
.badge-cancel{background:var(--red-soft);color:var(--red)}
.sale-badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:5px}
.sale-golf{background:#EFF6FF;color:#1D4ED8}
.sale-pea{background:var(--green-soft);color:var(--green)}
.sale-oil{background:var(--amber-soft);color:var(--amber)}

/* MODAL - THE FIX */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.45);
  z-index:999;
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.modal-overlay.open{display:flex}
.modal-box{
  background:#fff;
  border-radius:var(--r);
  box-shadow:var(--shadow-lg);
  width:100%;
  max-width:560px;
  display:flex;
  flex-direction:column;
  max-height:calc(100vh - 40px);
  overflow:hidden;
}
.modal-head{
  padding:18px 20px 14px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  flex-shrink:0;
}
.modal-head-title{font-size:16px;font-weight:700;color:var(--text)}
.modal-head-sub{font-size:12px;color:var(--text3);margin-top:3px}
.modal-close-btn{width:30px;height:30px;border-radius:7px;display:grid;place-items:center;color:var(--text3);font-size:16px;line-height:1;transition:all .12s;flex-shrink:0;margin-left:8px}
.modal-close-btn:hover{background:var(--surface2);color:var(--text)}
.modal-scroll{
  flex:1;
  overflow-y:auto;
  padding:18px 20px;
}
.modal-foot{
  padding:12px 20px;
  border-top:1px solid var(--border);
  display:flex;
  justify-content:flex-end;
  gap:8px;
  flex-shrink:0;
  background:#fff;
}

/* ORDER DETAIL inside modal */
.detail-section{margin-bottom:16px}
.detail-section-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.detail-no-big{font-family:var(--mono);font-size:26px;font-weight:800;letter-spacing:-1px;color:var(--text)}
.field-grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field-block{display:flex;flex-direction:column;gap:4px}
.field-lbl{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px}
.field-val{font-size:13px;color:var(--text);line-height:1.5}
.field-val.mono{font-family:var(--mono);font-size:12px}
.field-val.note-text{color:var(--text2);font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word}

/* ITEMS TABLE inside modal */
.items-tbl{width:100%;border-collapse:collapse;font-size:13px}
.items-tbl th{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);background:var(--bg)}
.items-tbl th.r,.items-tbl td.r{text-align:right}
.items-tbl td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:top}
.items-tbl tbody tr:last-child td{border-bottom:none}
.item-nm{font-size:12px;font-weight:600;color:var(--text)}
.item-cd{font-size:11px;color:var(--text3);font-family:var(--mono)}
.total-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--green-soft);border-radius:0 0 var(--r-sm) var(--r-sm)}
.total-bar .lbl{font-size:12px;color:var(--green-dark)}
.total-bar .amt{font-size:16px;font-weight:800;font-variant-numeric:tabular-nums;color:var(--green)}

/* SO / WAREHOUSE blocks */
.action-block{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:12px 14px;margin-bottom:10px}
.action-block-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.check-row{display:flex;align-items:center;gap:9px;padding:6px 0;font-size:13px;font-weight:600;cursor:pointer;color:var(--text2)}
.check-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--green);cursor:pointer;flex-shrink:0}
.check-row.on{color:var(--green)}
.stage-pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.stage-pill{padding:6px 14px;border-radius:99px;font-size:12px;font-weight:700;border:1.5px solid var(--border2);background:#fff;color:var(--text3);cursor:pointer;transition:all .15s}
.stage-pill:hover{border-color:var(--green);color:var(--green)}
.stage-pill.sp-open{border-color:var(--blue);background:var(--blue-soft);color:var(--blue)}
.stage-pill.sp-prep{border-color:var(--amber);background:var(--amber-soft);color:var(--amber)}
.stage-pill.sp-ship{border-color:var(--green);background:var(--green-soft);color:var(--green)}

/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group.span2{grid-column:1/-1}
.form-label{font-size:12px;font-weight:700;color:var(--text2)}
.form-label .req{color:var(--red)}
.seg{display:flex;gap:6px;flex-wrap:wrap}
.seg-btn{padding:7px 15px;border-radius:var(--r-sm);border:1.5px solid var(--border2);background:#fff;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;transition:all .12s}
.seg-btn:hover{border-color:var(--green);color:var(--green)}
.seg-btn.on{border-color:var(--green);background:var(--green-soft);color:var(--green)}

/* PRODUCT PICKER */
.prod-list{border:1.5px solid var(--border);border-radius:var(--r-sm);overflow:hidden;max-height:360px;overflow-y:auto;background:#fff}
.prod-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);transition:background .1s}
.prod-row:last-child{border-bottom:none}
.prod-row:hover{background:#F0FDF9}
.prod-info{flex:1;min-width:0}
.prod-name{font-size:13px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prod-code{font-size:11px;color:var(--text3);font-family:var(--mono)}
.prod-price{font-size:12px;color:var(--text2);white-space:nowrap;font-weight:600}
.qty-wrap{display:flex;align-items:center;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r-sm);overflow:hidden}
.qty-wrap button{width:28px;height:28px;font-size:15px;font-weight:700;color:var(--text3);display:grid;place-items:center;transition:all .1s}
.qty-wrap button:hover{background:var(--green-soft);color:var(--green)}
.qty-wrap input{width:46px;text-align:center;background:none;border:none;font-size:13px;font-weight:700;font-family:var(--mono);padding:0;color:var(--text);box-shadow:none;border-radius:0}

/* CART */
.cart-box{background:#fff;border:1.5px solid var(--border);border-radius:var(--r-sm);overflow:hidden}
.cart-item{display:flex;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--border);font-size:12px}
.cart-item:last-child{border-bottom:none}
.cart-item .n{flex:1;min-width:0;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:8px}
.cart-item .a{font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap;color:var(--text)}
.cart-total-row{display:flex;justify-content:space-between;padding:10px 12px;background:var(--green-soft);font-weight:800;font-size:14px}
.cart-total-row span:last-child{color:var(--green);font-variant-numeric:tabular-nums}

/* PRODUCTS GRID */
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.prod-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--r);padding:12px 14px;display:flex;justify-content:space-between;align-items:center;gap:10px;cursor:pointer;transition:all .12s;box-shadow:var(--shadow)}
.prod-card:hover{border-color:var(--green);transform:translateY(-1px);box-shadow:var(--shadow-md)}

/* WAREHOUSE KANBAN */

/* KANBAN v2 */
.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:1100px){.kanban{grid-template-columns:1fr}}
.kanban-col{background:#fff;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column}
.kanban-head{padding:12px 16px;font-size:13px;font-weight:700;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.kanban-head-badge{font-size:11px;font-weight:700;padding:2px 10px;border-radius:99px;background:var(--bg)}
.kanban-body{padding:10px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;max-height:600px}
.kanban-card{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:10px 12px;cursor:pointer;transition:all .12s}
.kanban-card:hover{border-color:var(--green);background:#F0FDF9;transform:translateY(-1px);box-shadow:var(--shadow)}
.kanban-card-no{font-family:var(--mono);font-size:12px;font-weight:800;color:var(--green)}
.kanban-card-cust{font-size:12px;font-weight:600;color:var(--text);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.kanban-card-bill{font-family:var(--mono);font-size:11px;color:var(--blue);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.kanban-card-meta{display:flex;justify-content:space-between;align-items:center;margin-top:8px;gap:6px}
.kanban-card-date{font-size:10px;color:var(--text3)}
.kanban-card-btns{display:flex;gap:3px;flex-wrap:nowrap}
.ks-btn{padding:3px 7px;border-radius:5px;font-size:10px;font-weight:700;border:1.5px solid var(--border2);background:#fff;color:var(--text3);cursor:pointer;transition:all .12s;white-space:nowrap}
.ks-btn:hover{border-color:var(--green);color:var(--green);background:var(--green-soft)}
.ks-btn.ks-open{border-color:var(--blue);background:#EFF6FF;color:var(--blue)}
.ks-btn.ks-prep{border-color:var(--amber);background:var(--amber-soft);color:var(--amber)}
.ks-btn.ks-ship{border-color:var(--green);background:var(--green-soft);color:var(--green)}

/* PAGE */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.page-title{font-size:20px;font-weight:800;letter-spacing:-.4px;color:var(--text)}
.page-sub{font-size:13px;color:var(--text3);margin-top:3px}

/* EMPTY */
.empty-state{display:flex;flex-direction:column;align-items:center;padding:56px 20px;text-align:center;gap:10px}
.empty-state svg{width:40px;height:40px;stroke:var(--text3);fill:none;stroke-width:1.5}
.empty-state .et{font-size:15px;font-weight:700;color:var(--text2)}
.empty-state .es{font-size:13px;color:var(--text3);max-width:260px;line-height:1.55}

/* TOAST */
.toast-area{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;pointer-events:none;display:flex;flex-direction:column;gap:8px;align-items:center}

// ── CSV PARSER ────────────────────────────────
// receipts columns:
// 0:note 1:No. 2:date 3:sale 4:total 7:ชื่อบริษัท
// 8:รายการวัตถุดิบ 9:จำนวน(KG) 10:ราคา/กิโล
// 11:การชำระเงิน 12:สถานะชำระ 13:LinkPO 14:ขนส่ง
// 15:จัดส่งที่ 16:วันส่ง 20:หมายเหตุ1 21:SONumber 22:สถานะจัดส่ง

function parseCSVLine(line){
  const cols=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else{inQ=!inQ;}}
    else if(c===','&&!inQ){cols.push(cur);cur='';}
    else{cur+=c;}
  }
  cols.push(cur);
  return cols;
}

function splitItems(col8,col9,col10){
  // หลายสินค้าคั่นด้วย comma ใน quoted field
  // แยกโดยใช้ product code 9 หลักเป็น delimiter
  const qtys   = col9.split(',').map(s=>+s.trim().replace(/,/g,'')||0);
  const prices  = col10.split(',').map(s=>+s.trim().replace(/,/g,'')||0);
  const parts   = col8.split(/(?=\d{9}\s)/).map(s=>s.trim().replace(/,\s*$/,'')).filter(Boolean);
  const n = Math.max(parts.length,1);
  return Array.from({length:n},(_,i)=>({
    id:    (parts[i]||'').match(/^(\d{9})/)?.[1]||'',
    name:  (parts[i]||'').replace(/^\d{9}\s*/,'').replace(/,\s*$/,'').trim(),
    qty:   qtys[i]||0,
    price: prices[i]||0,
  })).filter(x=>x.name||x.qty);
}

function parseReceiptsCSV(text){
  const lines=text.replace(/\r/g,'').split('\n').filter(l=>l.trim());
  if(lines.length<2)return[];
  const orders=[];
  for(let i=1;i<lines.length;i++){
    const r=parseCSVLine(lines[i]);
    const noRaw=(r[1]||'').trim();
    if(!noRaw||isNaN(+noRaw))continue;
    const items=splitItems(r[8]||'',r[9]||'',r[10]||'');
    const soNo=(r[21]||'').trim();
    const soOpened=soNo.length>0;
    let payStatus=(r[12]||'ยังไม่ชำระ').trim();
    if(/ชำระแล้ว|จ่ายแล้ว|paid/i.test(payStatus))payStatus='ชำระแล้ว';
    else if(!payStatus)payStatus='ยังไม่ชำระ';
    const noteOuter=(r[0]||'').trim();
    const noteInner=(r[20]||'').trim();
    const note=[noteOuter,noteInner].filter(Boolean).join(' | ');
    orders.push({
      no:+noRaw,
      date:(r[2]||'').trim(),
      sale:(r[3]||'').trim(),
      cust:(r[7]||'').trim(),
      items,
      pay:(r[11]||'').trim(),
      po:(r[13]||'').trim(),
      payStatus,
      shipper:(r[14]||'').trim(),
      shipTo:(r[15]||'').trim(),
      shipDate:(r[16]||'').trim(),
      note,
      soOpened,
      soNo,
      wStage:(r[22]||'').trim(),
      soNote:'',
      whNote:'',
      billDocNo:(r[23]||'').trim(),
    });
  }
  return orders.reverse();
}

async function loadOrdersGAS(){
  try{
    const res=await fetch(GAS_URL+'?action=GET_ORDERS&_t='+Date.now(),{
      redirect:'follow',
    });
    if(!res.ok)throw new Error('HTTP '+res.status);
    const json=await res.json();
    if(!json.ok)throw new Error(json.error||'GAS error');
    if(!json.data||json.data.length===0)throw new Error('0 rows');
    ORDERS=filterDeleted(json.data);
    return true;
  }catch(e){
    console.warn('[loadGAS]',e.message);
    return false;
  }
}

async function loadOrdersCSV(){
  try{
    const r=await fetch(CSV_RECEIPTS+'&_nc='+Date.now());
    if(!r.ok)throw new Error('HTTP '+r.status);
    const text=await r.text();
    if(text.trim().startsWith('<!'))throw new Error('Not published');
    const parsed=parseReceiptsCSV(text);

    ordersLoaded=true;
    return true;

    console.warn('loadOrdersCSV:',e.message);

  }
}

// ป้องกันกรณี Google Sheets CSV cache ยังไม่ update
function getDeletedNos(){
  try{
    const raw=localStorage.getItem('ins_deleted_nos');
    return raw?JSON.parse(raw):[];
  }catch(e){return[];}
}
function addDeletedNo(no){
  try{
    const list=getDeletedNos();
    if(!list.includes(+no)){list.push(+no);}
    localStorage.setItem('ins_deleted_nos',JSON.stringify(list));
  }catch(e){}
}
function removeDeletedNo(no){
  // ถ้า GAS ยืนยันว่าลบสำเร็จในชีตแล้ว ไม่ต้อง track ต่อ
  try{
    const list=getDeletedNos().filter(n=>n!==+no);
    localStorage.setItem('ins_deleted_nos',JSON.stringify(list));
  }catch(e){}
}
function filterDeleted(orders){
  const del=getDeletedNos();
  if(del.length===0)return orders;
  return orders.filter(o=>!del.includes(+o.no));
}

    plus:'<circle cx="12" cy="12" r="10"/><path d="M12 8v8m-4-4h8"/>',
    doc:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/>',
    warehouse:'<rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8m-4-4v4"/>',
    out:'<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>',
    edit:'<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>',

  };
  return`<svg viewBox="${size}" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">${m[n]||''}</svg>`;
}

function pipe(o){
  const s=plabel(o);
  const sep='<span class="pipe-sep">›</span>';
  const step=(lbl,ico,cls)=>`<span class="pipe-step ${cls}">${icon(ico)}${lbl}</span>`;
  const s1=step('เซลล์','list',s!=='sale'?'pipe-done':'pipe-active');
  const s2=step('SO','doc',s==='so'?'pipe-active':s==='wh'||s==='done'?'pipe-done':'pipe-wait');
  const s3=step('คลัง','warehouse',s==='wh'?'pipe-active':s==='done'?'pipe-done':'pipe-wait');
  const s4=step('จัดส่ง','truck',s==='done'?'pipe-done':'pipe-wait');
  return`<div class="pipeline">${s1}${sep}${s2}${sep}${s3}${sep}${s4}</div>`;
}

function doLoginEmail(){
  const email=(document.getElementById('login-email').value||'').trim().toLowerCase();
  const pass=(document.getElementById('login-pass').value||'').trim();
  const err=document.getElementById('login-err');
  if(!email){err.textContent='กรุณากรอก Email';return;}
  if(pass!==LOGIN_PASS){err.textContent='Password ไม่ถูกต้อง';return;}
  if(!USERS[email]){err.textContent='ไม่พบ Email นี้ในระบบ';return;}
  err.textContent='';

  try{localStorage.setItem('ins_user_email',email);}catch(e){}
  document.getElementById('m-login').classList.remove('open');
  renderShell();
  nav('orders');
  toast('ยินดีต้อนรับ '+email,'ok');
}
function doLogout(){
  role=null;userEmail='';userName='';
  try{localStorage.removeItem('ins_user_email');}catch(e){}
  document.getElementById('m-login').classList.add('open');
  // clear fields
  const em=document.getElementById('login-email');
  const ps=document.getElementById('login-pass');
  if(em)em.value='';if(ps)ps.value='';
}

function chQ(pid,price,d){
  const pname=PRODUCTS.find(p=>p.id===pid)?.name||pid;
  if(!draft.items[pid])draft.items[pid]={qty:0,price,name:pname};
  draft.items[pid].qty=Math.max(0,draft.items[pid].qty+d);
  if(draft.items[pid].qty===0)delete draft.items[pid];
  render(false);
}
function setQ(pid,price,qty){
  qty=Math.max(0,+qty||0);
  if(qty===0){delete draft.items[pid];render(false);return;}
  const pname=PRODUCTS.find(p=>p.id===pid)?.name||pid;
  if(!draft.items[pid])draft.items[pid]={qty,price,name:pname};
  else draft.items[pid].qty=qty;
  render(false);
}
function saveOrder(){
  const items=Object.entries(draft.items).filter(([,v])=>v.qty>0).map(([id,v])=>({id,name:v.name,qty:v.qty,price:v.price}));
  const isEdit = draft._editNo != null;  // มาจาก editOrder()

  if(isEdit){
    // ── UPDATE ออเดอร์เดิม ──
    const no=draft._editNo;
    const idx=ORDERS.findIndex(x=>x.no===no);
    if(idx>=0){
      // รักษา field SO/warehouse ไว้ เปลี่ยนแค่ field ที่ user แก้ได้
      const existing=ORDERS[idx];
      const o={
        ...existing,          // คง soOpened, soNo, wStage, soNote, whNote, billDocNo
        sale:draft.sale,
        cust:draft.cust,
        pay:draft.pay,
        payStatus:draft.payStatus,
        po:draft.po,
        shipper:draft.shipper,
        shipTo:draft.shipTo,
        shipDate:draft.shipDate,
        note:draft.note,
        items,
      };
      ORDERS[idx]=o;
      draft=null;
      toast(`บันทึกการแก้ไข No.${no} แล้ว`,'ok');
      sync('UPDATE_ORDER',{
        no,
        sale:o.sale, cust:o.cust,
        pay:o.pay, payStatus:o.payStatus,
        po:o.po, shipper:o.shipper,
        shipTo:o.shipTo, shipDate:o.shipDate,
        note:o.note,
        items:o.items,
      });
    }
  } else {
    // ── NEW ออเดอร์ใหม่ ──
    const no=nextOrderNo();
    const now=new Date();
    const d=`${now.getDate().toString().padStart(2,'0')}/${(now.getMonth()+1).toString().padStart(2,'0')}/${now.getFullYear()}`;
    const o={...draft,no,date:d,items,soOpened:false,soNo:'',wStage:'',soNote:'',whNote:'',billDocNo:''};
    ORDERS.unshift(o);
    pendingOrders.add(no);  // เพิ่มเข้า pending รอ batch save
    draft=null;
    toast(`เพิ่มออเดอร์ No.${no} — กด "บันทึกรายการ" เพื่อส่งไป Sheet`,'ok');
  }
  nav('orders');
}
// ── BATCH SAVE ──────────────────────────────
async function batchSaveOrders(){
  if(pendingOrders.size===0){toast('ไม่มีรายการรอบันทึก','err');return;}
  if(!GAS_URL||GAS_URL==='YOUR_APPS_SCRIPT_URL_HERE'){
    toast('ยังไม่ได้ตั้ง GAS_URL','err');return;
  }

  const btn=document.querySelector('button[onclick="batchSaveOrders()"]');
  if(btn){btn.disabled=true;btn.textContent='กำลังบันทึก…';}

  const toSave=[...pendingOrders];
  let success=0, fail=0;

  for(const no of toSave){
    const o=ORDERS.find(x=>x.no===no);
    if(!o){pendingOrders.delete(no);continue;}
    try{
      const res=await fetch(GAS_URL,{
        method:'POST',
        redirect:'follow',
        body:JSON.stringify({action:'NEW_ORDER',data:o}),
        headers:{'Content-Type':'text/plain;charset=utf-8'},
      });
      const json=await res.json().catch(()=>({}));
      if(json.ok){
        pendingOrders.delete(no);
        success++;
      } else {
        console.warn('[batch] GAS error No.'+no+':',json.error);
        fail++;
      }
    }catch(e){
      console.warn('[batch] fetch error:',e.message);
      fail++;
    }
  }

  render(false); // refresh เพื่ออัปเดตปุ่มและ highlight
  if(fail===0){
    toast(`✅ บันทึก ${success} รายการสำเร็จ`,'ok');
  } else {
    toast(`บันทึกสำเร็จ ${success} / ล้มเหลว ${fail} รายการ`,'err');
  }
}

    items:Object.fromEntries(o.items.map(i=>[i.id,{qty:i.qty,price:i.price,name:i.name}]))

function deleteOrder(no){
  // 1. เก็บ No. ที่ลบใน localStorage ทันที (ก่อน sync)
  addDeletedNo(no);
  // 2. ลบออกจาก ORDERS และ pendingOrders ใน memory
  ORDERS=ORDERS.filter(o=>o.no!==no);
  pendingOrders.delete(no);  // ถ้า pending → ยกเลิกด้วย ไม่ต้อง save
  closeModal('m-order');
  render(false);
  toast(`ลบออเดอร์ No.${no} แล้ว`,'ok');
  // 3. sync ไปยัง GAS — ถ้าสำเร็จ removeDeletedNo (ชีตลบแล้ว ไม่ต้อง track อีก)
  syncDelete(no);
}
async function syncDelete(no){
  if(!GAS_URL||GAS_URL==='YOUR_APPS_SCRIPT_URL_HERE')return;
  try{
    const res=await fetch(GAS_URL,{
      method:'POST',
      redirect:'follow',
      body:JSON.stringify({action:'DELETE_ORDER',data:{no}}),
      headers:{'Content-Type':'text/plain;charset=utf-8'},
    });
    const json=await res.json().catch(()=>({}));
    if(json.ok){
      // ลบสำเร็จในชีตแล้ว → ลบออกจาก localStorage tracking
      removeDeletedNo(no);
      console.log('[delete] Sheet row deleted, No.'+no);
    } else {
      console.warn('[delete] GAS error:',json.error);
      // ยังเก็บใน deletedNos ไว้ก่อน เพื่อกรองตอน refresh
    }
  }catch(e){
    console.warn('[delete] fetch error:',e.message);
    // ยังเก็บใน deletedNos ไว้ก่อน
  }
}

// ── PRODUCTS ─────────────────────────────────

function showProdEdit(id){
  const p=PRODUCTS.find(x=>x.id===id)||{id:'',name:'',price:0,unit:'kg'};
  document.getElementById('m-prod-head').innerHTML=`<div class="modal-head-title">${id?'แก้ไขสินค้า':'เพิ่มสินค้า'}</div><button class="modal-close-btn" onclick="closeModal('m-prod')">✕</button>`;
  document.getElementById('m-prod-body').innerHTML=`
  <div class="form-grid">
    <div class="form-group span2"><label class="form-label">รหัสสินค้า</label><input id="ep-id" value="${p.id}" placeholder="เช่น 100201100" style="font-family:var(--mono)"></div>
    <div class="form-group span2"><label class="form-label">ชื่อสินค้า</label><input id="ep-name" value="${p.name}"></div>
    <div class="form-group"><label class="form-label">ราคา (บาท)</label><input type="number" id="ep-price" value="${p.price}"></div>
    <div class="form-group"><label class="form-label">หน่วย</label><select id="ep-unit"><option ${p.unit==='kg'?'selected':''}>kg</option><option ${p.unit==='unit'?'selected':''}>unit</option></select></div>
  </div>`;
  document.getElementById('m-prod-foot').innerHTML=`<button class="btn btn-ghost" onclick="closeModal('m-prod')">ยกเลิก</button><button class="btn btn-primary" onclick="saveProd('${id||''}')">บันทึก</button>`;
  openModal('m-prod');
}
function saveProd(old){
  const newid=document.getElementById('ep-id').value.trim();
  const name=document.getElementById('ep-name').value.trim();
  const price=+document.getElementById('ep-price').value||0;
  const unit=document.getElementById('ep-unit').value;
  if(!newid||!name){toast('กรุณากรอกรหัสและชื่อ','err');return;}
  const idx=PRODUCTS.findIndex(p=>p.id===old);
  if(idx>=0)PRODUCTS[idx]={id:newid,name,price,unit};
  else PRODUCTS.unshift({id:newid,name,price,unit});
  closeModal('m-prod');toast('บันทึกสินค้าแล้ว','ok');sync('UPDATE_PRODUCT',{id:newid,name,price,unit});render(false);
}

// ── SO MANAGE ─────────────────────────────────
function soTableRows(list){
  const isPending = list[0] && !list[0].soOpened;
  return list.map(o=>`<tr onclick="showOrder(${o.no})">
    <td><span class="order-no">${o.no}</span></td>
    <td><span class="order-date" style="font-size:11px">${o.date}</span></td>
    <td><span class="sale-badge sale-${o.sale.toLowerCase()}">${o.sale}</span></td>
    <td><div style="font-weight:600;font-size:13px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${o.cust.replace(/^[A-Z]\d+ /,'')}</div></td>
    <td><span class="badge ${o.payStatus==='ชำระแล้ว'?'badge-paid':'badge-unpaid'}">${o.payStatus}</span></td>
    ${isPending
      ?`<td class="order-amount" style="font-size:13px">฿${fmt(tot(o))}</td>
        <td><button class="btn btn-success btn-sm" style="width:100%" onclick="event.stopPropagation();showOrder(${o.no})">เปิด SO</button></td>`

        <td class="order-amount" style="font-size:13px">฿${fmt(tot(o))}</td>`}
  </tr>`).join('');
}

    <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
      <span style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px">Sale</span>
      ${['ทั้งหมด','Golf','Pea','Oil'].map(s=>`<button class="filter-chip ${fSOSale===s?'active':''}" onclick="fSOSale='${s}';render(false)">${s}</button>`).join('')}
    </div>
  </div>

  ${filtered.length===0?`<div class="empty-state">${icon('doc')}<div class="et">ไม่พบออเดอร์ที่ตรงเงื่อนไข</div></div>`:''}

  ${(fSOStatus==='ทั้งหมด'||fSOStatus==='รอเปิด')&&pending.length>0?`

  <div class="table-wrap" style="margin-bottom:20px;overflow-x:auto">
    <table class="order-table" style="min-width:560px">
    <thead><tr><th style="width:58px">No.</th><th style="width:86px">วันที่</th><th style="width:54px">Sale</th><th>ลูกค้า</th><th style="width:86px">ชำระ</th><th style="width:82px;text-align:right">ยอด</th><th style="width:90px"></th></tr></thead>

              return`<button class="ks-btn ${cl}" onclick="event.stopPropagation();setWS(${o.no},'${st}');render(false)">${lbl}</button>`;

        </div>
      </div>`).join('')}
    </div>
  </div>`).join('')}

// ── SYNC ──────────────────────────────────────
async function sync(action,data){
  if(!GAS_URL||GAS_URL==='YOUR_APPS_SCRIPT_URL_HERE'){
    console.log('[sync] offline mode — GAS_URL not set');
    return;
  }
  try{
    // GAS Web App ต้องการ redirect:'follow' เพราะ redirect 302 ก่อนส่ง response
    const res=await fetch(GAS_URL,{
      method:'POST',
      redirect:'follow',
      body:JSON.stringify({action,data}),
      headers:{'Content-Type':'text/plain;charset=utf-8'},
    });
    const text=await res.text();
    let json={};
    try{json=JSON.parse(text);}catch(e){
      console.warn('[sync] non-JSON response:',text.substring(0,100));
      return;
    }
    if(json.ok===false){
      console.warn('[sync] GAS error:',json.error);
    } else {
      console.log('[sync] ok:',action,json);
    }
  }catch(e){
    console.warn('[sync] fetch error:',e.message);
  }
}
